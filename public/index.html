<!DOCTYPE html>
<html>
<head>
    <title>Collapse RC - Полевой тест</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body { 
            background: #0a0a0a; 
            color: #00ff00; 
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #1a1a1a;
            border-radius: 15px;
            padding: 20px;
            border: 2px solid #00ff00;
        }
        h1 {
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
            font-size: 24px;
        }
        .status {
            font-size: 20px;
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            background: #0f0f0f;
        }
        .coord {
            font-size: 16px;
            margin: 10px 0;
            padding: 10px;
            background: #0f0f0f;
            border-radius: 5px;
        }
        .safe { color: #00ff00; }
        .danger { color: #ff0000; }
        .dead { color: #ff0000; animation: blink 1s infinite; }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
        .log {
            text-align: left;
            max-height: 300px;
            overflow-y: auto;
            background: #0f0f0f;
            padding: 10px;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 12px;
        }
        button {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 5px;
            margin: 10px 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .force-start {
            background: #ff6600;
        }
        .coord-highlight {
            background: #00ff00;
            color: #000;
            font-weight: bold;
        }
        .tree-list {
            font-size: 11px;
            text-align: left;
            max-height: 150px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 COLLAPSE RESEARCH CENTER</h1>
        <h2>ФАЗА 1: Дорога Страшноездов</h2>
        
        <div class="status" id="connectionStatus">
            🔴 Ожидание подключения...
        </div>
        
        <div class="coord" id="positionDisplay">
            📍 Координаты: ожидание GPS...
        </div>
        
        <div class="coord" id="accuracyDisplay">
            🎯 Точность: -- м
        </div>
        
        <div class="coord" id="safetyDisplay">
            🛡 Статус: -- 
        </div>
        
        <div class="coord" id="gameStatus">
            🎮 Игра: -- 
        </div>
        
        <div class="coord" id="zoneStatus">
            🚪 Стартовая зона: -- 
        </div>
        
        <button onclick="testSound()">🔊 Тест звука</button>
        <button onclick="copyCoords()">📋 Копировать координаты</button>
        <button class="force-start" onclick="forceStart()">⚠️ ПРИНУДИТЕЛЬНЫЙ СТАРТ</button>
        
        <h3>🌲 Деревья-укрытия:</h3>
        <div class="tree-list" id="treeList"></div>
        
        <h3>📝 Журнал событий:</h3>
        <div class="log" id="log">
            [--:--:--] Ожидание событий...
        </div>
    </div>

    <script>
        let socket;
        let playerId;
        let logDiv = document.getElementById('log');
        let lastPosition = null;
        
        // Звуковой синтезатор
         const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      functionplayBeep(type) {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            switch(type) {
                case 'start':
                    oscillator.frequency.value = 440;
                    gainNode.gain.value = 0.3;
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 2);
                    log('🎵 СТАРТОВАЯ МЕЛОДИЯ');
                    break;
                case 'scary':
                    oscillator.frequency.value = 220;
                    gainNode.gain.value = 0.5;
                    oscillator.frequency.setValueAtTime(220, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.5);
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 1.5);
                    log('👹 СТРАШНОЕЗД! Беги к дереву!');
                    break;
                case 'death':
                    oscillator.frequency.value = 100;
                    gainNode.gain.value = 0.7;
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 2);
                    log('💀 ВЫ ПОГИБЛИ');
                    break;
                default:
                    oscillator.frequency.value = 880;
                    gainNode.gain.value = 0.2;
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.3);
            }
        }
        
       function playSound(soundName) {
    // Пытаемся найти файл на сервере
    let soundUrl = '/sounds/' + soundName;
    
    // Создаём аудио элемент
    let audio = new Audio(soundUrl);
    
    // Обработчик успешной загрузки
    audio.oncanplaythrough = () => {
        audio.play().catch(e => {
            log('⚠️ Ошибка воспроизведения: ' + e.message);
            // Если не получилось — используем синтезатор
            fallbackBeep(soundName);
        });
    };
    
    // Обработчик ошибки загрузки (файла нет)
    audio.onerror = () => {
        log('⚠️ Файл не найден: ' + soundName + ', использую синтезатор');
        fallbackBeep(soundName);
    };
    
    // Таймаут на всякий случай
    setTimeout(() => {
        if (audio.readyState === 0) {
            log('⚠️ Таймаут загрузки: ' + soundName);
            fallbackBeep(soundName);
        }
    }, 2000);
}

function fallbackBeep(soundName) {
    // Запасной синтезатор на случай, если нет mp3
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    
    if (soundName.includes('start')) {
        oscillator.frequency.value = 440;
        gainNode.gain.value = 0.3;
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 2);
    } else if (soundName.includes('scaryride')  soundName.includes('slower')  soundName.includes('rusher')) {
        oscillator.frequency.value = 220;
        gainNode.gain.value = 0.5;
        oscillator.frequency.setValueAtTime(220, audioCtx.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.5);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 1.5);
    } else if (soundName.includes('death')) {
        oscillator.frequency.value = 100;
        gainNode.gain.value = 0.7;
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 2);
    }
}
        }
        
        function log(message) {
            let entry = document.createElement('div');
            let time = new Date().toLocaleTimeString();
            entry.textContent = '[' + time + '] ' + message;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }
        
        // Подключение к серверу
        function connect() {
            let serverUrl = window.location.origin;
            log('🔌 Подключение к ' + serverUrl);
            socket = io(serverUrl);
            
            socket.on('connect', () => {
                playerId = socket.id;
                document.getElementById('connectionStatus').innerHTML = '✅ ПОДКЛЮЧЕНО К СЕРВЕРУ';
                document.getElementById('connectionStatus').style.color = '#00ff00';
                log('✅ Подключено! ID: ' + playerId.substring(0, 8));
            });
            
            socket.on('disconnect', () => {
                document.getElementById('connectionStatus').innerHTML = '🔴 ПОТЕРЯНО СОЕДИНЕНИЕ';
                document.getElementById('connectionStatus').style.color = '#ff0000';
                log('🔴 Отключено от сервера');
            });
            
            socket.on('game_config', (config) => {
                log('📦 Получена конфигурация');
                log('📍 Стартовая зона: ' + config.startZone.position[0].toFixed(6) + ', ' + config.startZone.position[1].toFixed(6));
                log('🌲 Деревьев: ' + config.safeTrees.length);
                
                // Отображаем деревья
                let treeHtml = '';
                config.safeTrees.forEach((tree, idx) => {treeHtml += <div>🌲 ${idx+1}: ${tree.position[0].toFixed(6)}, ${tree.position[1].toFixed(6)} (радиус ${tree.radius}м)</div>;
                });
                document.getElementById('treeList').innerHTML = treeHtml;
            });
            
            socket.on('play_sound', (data) => {
                log('🔊 КОМАНДА: ' + data.sound);
                playSound(data.sound);
            });
            
            socket.on('player_died', (data) => {
                if (data.playerId === playerId) {
                    document.getElementById('safetyDisplay').innerHTML = '💀 ВЫ ПОГИБЛИ от ' + data.cause;
                    document.getElementById('safetyDisplay').className = 'dead';
                    log('💀 ВЫ ПОГИБЛИ от ' + data.cause);
                    playSound('death');
                } else {
                    log('💀 Игрок ' + data.playerName + ' погиб от ' + data.cause);
                }
            });
            
            socket.on('respawned', () => {
                document.getElementById('safetyDisplay').innerHTML = '✨ ВЫ ВОСКРЕСЛИ';
                document.getElementById('safetyDisplay').className = 'safe';
                log('✨ Вы воскресли');
            });
        }
        
        // GPS слежение
        function startGPS() {
            if (!navigator.geolocation) {
                log('❌ GPS не поддерживается браузером!');
                document.getElementById('positionDisplay').innerHTML = '❌ GPS НЕ ПОДДЕРЖИВАЕТСЯ';
                return;
            }
            
            log('📍 Запуск GPS...');
            
            navigator.geolocation.watchPosition(
                (position) => {
                    let lat = position.coords.latitude;
                    let lng = position.coords.longitude;
                    let accuracy = position.coords.accuracy;
                    
                    lastPosition = [lat, lng];
                    
                    document.getElementById('positionDisplay').innerHTML = 
                        📍 Координаты: <span class="coord-highlight">${lat.toFixed(6)}</span>, <span class="coord-highlight">${lng.toFixed(6)}</span>;
                    document.getElementById('accuracyDisplay').innerHTML = 
                        🎯 Точность: ${accuracy.toFixed(1)} метров;
                    
                    if (socket && socket.connected) {
                        socket.emit('update_position', [lat, lng]);
                    }
                },
                (error) => {
                    let errorMsg = 'Ошибка GPS: ';
                    switch(error.code) {
                        case 1: errorMsg += 'Нет разрешения'; break;
                        case 2: errorMsg += 'Сигнал недоступен'; break;
                        case 3: errorMsg += 'Таймаут'; break;
                        default: errorMsg += error.message;
                    }
                    document.getElementById('positionDisplay').innerHTML = '❌ ' + errorMsg;
                    log('❌ ' + errorMsg);
                },
                {
                    enableHighAccuracy: true,
                    maximumAge: 0,
                    timeout: 15000
                }
            );
            log('📍 GPS запущен (высокая точность)');
        }
        
        // Принудительный старт
        function forceStart() {
            if (socket && socket.connected) {
                socket.emit('force_start');
                log('🚨 Отправлена команда ПРИНУДИТЕЛЬНОГО СТАРТА');
            } else {
                log('❌ Нет соединения с сервером');
            }
        }
        
        // Тест звука
        function testSound() {
            playBeep('test');
            log('🔊 Тест звука');
        }
        
        // Копирование координат
      function copyCoords() {
            if (lastPosition) {
                let coords = lastPosition[0].toFixed(6) + ', ' + lastPosition[1].toFixed(6);
                navigator.clipboard.writeText(coords);
                log('📋 Координаты скопированы: ' + coords);
            } else {
                log('⚠️ Нет координат для копирования');
            }
        }
        
        // Запуск
        window.onload = () => {
            connect();
            startGPS();
            
            // Разблокируем аудио после первого клика
            document.body.addEventListener('click', () => {
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                    log('🔊 Звук разблокирован');
                }
            }, { once: true });
            
            log('🚀 Страница загружена, ожидание GPS...');
        };
    </script>
</body>
</html>
